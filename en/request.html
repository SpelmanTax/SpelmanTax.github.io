<h1>Request information</h1>
<p>Please fill in the form below to request information about a service. I will reply within 24 hours.</p>

<form action="https://formspree.io/f/xpqkjevo" method="POST">

  <label for="service">Service</label>
  <input type="text" id="service" name="service" value="{{ page.service | default: site.service }}" readonly>

  <label for="name">Your name</label>
  <input type="text" id="name" name="name" required>

  <label for="email">Your email</label>
  <input type="email" id="email" name="email" required>

  <label for="message">Message</label>
  <textarea id="message" name="message" rows="5" placeholder="Write your request..." required></textarea>

  <button type="submit">Send request</button>
</form>
